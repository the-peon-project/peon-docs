# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "content.code.annotation",
    "content.code.copy",
    "content.tabs.link",
    "navigation.expand",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
    "toc.follow",
    "toc.integrate",
]

# Dark mode (default)
[[project.theme.palette]]
scheme = "slate"
primary = "green"
accent = "green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Light mode
[[project.theme.palette]]
scheme = "default"
primary = "green"
accent = "gray"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

